name: fnb

networks:
  fnb-network:
    name: fnb-network

volumes:
  db-data:
  node_modules_root:
  node_modules_auth_app:
  node_modules_tenant_app:
  node_modules_home_app:
  node_modules_msg_app:
  node_modules_graphql_api_app:
  node_modules_wf_app:
  node_modules_storage_app:
  node_modules_agent_app:
  agent-transcripts:                 # per-run JSONL transcripts — the agent engine's step-level record
  n8n-data:                          # n8n instance settings; state of record is the n8n_engine DB
  minio-data:
  clamav-db:
  zitadel-seed:                      # PAT + { issuer, clientId } handoff (zitadel → seed job → auth-app)

services:

  db:
    image: postgis/postgis
    platform: linux/amd64
    container_name: function_bucket
    networks:
      - fnb-network
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?}"
      POSTGRES_USER: "${POSTGRES_USER:?}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?}"
      # consumed by docker/db-init/10-create-zitadel-db.sh (fresh-volume init only)
      ZITADEL_DB_PASSWORD: "${ZITADEL_DB_PASSWORD:?}"
    ports:
      - "${DB_HOST_PORT:?}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # -h 127.0.0.1 forces TCP: on a fresh volume the postgres entrypoint's initdb bootstrap
      # server listens on the unix socket only, so a socket-based pg_isready passes BEFORE the
      # real server is up — db-migrate then hits the restart window and dies with exit 2.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:?} -d ${POSTGRES_DB:?}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  db-migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    networks:
      - fnb-network
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db:/db:ro
    environment:
      DB_URL: "${DB_URL:?}"
      PG_URL: "${PG_URL:?}"
      # Full ordered list — graphile.config.ts exposes every module schema, so all packages
      # must deploy or PostGraphile fails at boot. fnb-agent must precede fnb-storage /
      # fnb-location-datasets / fnb-airports (agent_worker grants + agent_fn refs).
      DEPLOY_PACKAGES: "${DEPLOY_PACKAGES:?}"
      # fnb-agent creates the agent_worker role with this password (sqitch --set).
      AGENT_WORKER_PG_PASSWORD: "${AGENT_WORKER_PG_PASSWORD:?}"
      # fnb-n8n creates the n8n_worker role with this password (sqitch --set).
      N8N_WORKER_PG_PASSWORD: "${N8N_WORKER_PG_PASSWORD:?}"
    restart: "no"

  pnpm-install:
    build:
      context: .
      dockerfile: apps/auth-app/Dockerfile
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_auth_app:/app/apps/auth-app/node_modules
      - node_modules_tenant_app:/app/apps/tenant-app/node_modules
      - node_modules_home_app:/app/apps/home-app/node_modules
      - node_modules_msg_app:/app/apps/msg-app/node_modules
      - node_modules_graphql_api_app:/app/apps/graphql-api-app/node_modules
      - node_modules_storage_app:/app/apps/storage-app/node_modules
      - node_modules_agent_app:/app/apps/agent-app/node_modules
    working_dir: /app
    command: ["pnpm", "install"]
    restart: "no"

  packages-watch:
    build:
      context: .
      dockerfile: apps/auth-app/Dockerfile
    logging:
      driver: "none"
    depends_on:
      pnpm-install:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
    working_dir: /app
    command: ["sh", "-c", "pnpm --filter @function-bucket/fnb-types build && pnpm --filter @function-bucket/fnb-db-access build && pnpm --filter @function-bucket/fnb-graphql-client-api build && pnpm --filter @function-bucket/fnb-auth-server build && pnpm --filter @function-bucket/fnb-auth-ui build && pnpm --filter @function-bucket/fnb-types dev & pnpm --filter @function-bucket/fnb-db-access dev & pnpm --filter @function-bucket/fnb-graphql-client-api dev & pnpm --filter @function-bucket/fnb-auth-server dev & pnpm --filter @function-bucket/fnb-auth-ui dev & wait"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/packages/fnb-types/dist/index.js && test -f /app/packages/db-access/dist/index.js && test -f /app/packages/auth-server/dist/index.js && test -f /app/packages/auth-ui/dist/index.js && test -f /app/packages/graphql-client-api/dist/index.js"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    platform: linux/amd64            # Apple Silicon: force amd64 (matches db service)
    container_name: fnb_minio
    networks:
      - fnb-network
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?}"
    ports:
      - "${MINIO_API_PORT:?}:9000"         # S3 API
      - "${MINIO_CONSOLE_PORT:?}:9001"     # web console (http://localhost:9001)
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    platform: linux/amd64            # Apple Silicon: force amd64 (matches db service)
    container_name: fnb_minio_init
    networks:
      - fnb-network
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/${S3_BUCKET:?} &&
      mc anonymous set download local/${S3_BUCKET:?}/public &&
      { mc ilm rule ls local/${S3_BUCKET:?} 2>/dev/null | grep -q quarantine ||
        mc ilm rule add --prefix 'quarantine/' --expire-days 7 local/${S3_BUCKET:?}; } &&
      echo 'bucket ready (public/ anon-readable; quarantine/ expires after 7 days)';
      "
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?}"
    restart: "no"

  clamav:
    image: clamav/clamav:1.5.3       # bundles clamd + freshclam
    platform: linux/amd64            # Apple Silicon: force amd64 (matches db service)
    container_name: fnb_clamav
    networks:
      - fnb-network
    ports:
      - "${CLAMAV_HOST_PORT:?}:3310"       # clamd TCP (host-exposed for debugging; dev only)
    volumes:
      - clamav-db:/var/lib/clamav    # persist the virus signature DB across restarts
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 180s             # first boot downloads/loads signatures — SLOW (~1-3 min)

  # Fresh named volumes are root-owned, but the distroless zitadel image runs as
  # uid 1000 (`zitadel`) and must write the FirstInstance PAT onto the volume —
  # chown it before zitadel boots or setup dies with EACCES on admin.pat.
  zitadel-init:
    image: alpine:3.20
    container_name: fnb_zitadel_init
    volumes:
      - zitadel-seed:/zitadel-seed
    command: ["chown", "-R", "1000:1000", "/zitadel-seed"]
    restart: "no"

  # ZITADEL — identity provider (OIDC login ceremony ONLY; the httpOnly `session`
  # cookie stays the root of trust). Spec: .claude/specs/future-auth/zitadel-login-pattern.md.
  # Own host port like minio — the issuer must own its origin, so it cannot live
  # under the nginx path prefix. No nginx change in dev.
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.3       # pinned (Decisions, 2026-07-08)
    container_name: fnb_zitadel
    networks:
      - fnb-network
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    depends_on:
      db:
        condition: service_healthy
      zitadel-init:
        condition: service_completed_successfully
    environment:
      # EXACTLY 32 chars; IMMUTABLE after first init (rebuild wipes volumes → re-init)
      ZITADEL_MASTERKEY: "${ZITADEL_MASTERKEY:?}"
      # Duplicates `--tlsMode disabled`: the healthcheck's `zitadel ready` probe reads
      # config from env only (no flags) and would otherwise probe https and never pass.
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_EXTERNALDOMAIN: "localhost"
      ZITADEL_EXTERNALPORT: "${ZITADEL_HOST_PORT:?}"
      ZITADEL_EXTERNALSECURE: "false"            # dev only
      # Dedicated `zitadel` database inside the shared postgis container
      # (docker/db-init/10-create-zitadel-db.sh creates it on a fresh volume;
      # the admin creds let `init` self-heal if it is ever missing).
      ZITADEL_DATABASE_POSTGRES_HOST: db
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: "${ZITADEL_DB_PASSWORD:?}"
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: "${POSTGRES_USER:?}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: "${POSTGRES_PASSWORD:?}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # FirstInstance — applied ONCE, during setup on a fresh zitadel database.
      # Seeds org + console human admin + the machine user whose PAT (written to
      # the shared volume) authenticates the zitadel-seed job.
      ZITADEL_FIRSTINSTANCE_INSTANCENAME: "fnb"
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel-seed/admin.pat
      ZITADEL_FIRSTINSTANCE_ORG_NAME: "fnb"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: zitadel-admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME: fnb
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: zitadel-admin@function-bucket.net
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "${ZITADEL_ADMIN_PASSWORD:?}"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: fnb-seeder
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: fnb seed automation
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      # DefaultInstance — also first-setup-only. Login-only posture (no self-
      # registration) + keep the built-in hosted login v1 on the v4 line, both per
      # the spec's Decisions section (2026-07-08).
      ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_ALLOWREGISTER: "false"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"
      # Relax password complexity so the dev seed password matches db/seed.sql
      # ('poiuytre' — lowercase-only). DEV ONLY.
      ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASUPPERCASE: "false"
      ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASNUMBER: "false"
      ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASSYMBOL: "false"
    ports:
      - "${ZITADEL_HOST_PORT:?}:8080"            # issuer + console (http://localhost:8200)
    volumes:
      - zitadel-seed:/zitadel-seed
    healthcheck:
      # distroless image (no curl/wget) — `zitadel ready` is the official probe of
      # the same readiness endpoint the spec names (/debug/healthz | /debug/ready)
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # One-shot idempotent seeding: project `fnb`, Web app (PKCE + Dev Mode), dev human
  # users mirroring db/seed.sql, then writes the { issuer, clientId } handoff JSON
  # that auth-app reads at runtime (breaks the generated-client-id chicken/egg).
  zitadel-seed:
    image: node:22-alpine
    container_name: fnb_zitadel_seed
    networks:
      - fnb-network
    depends_on:
      zitadel:
        condition: service_healthy
    environment:
      ZITADEL_INTERNAL_URL: http://zitadel:8080
      # ZITADEL resolves the instance from the Host header — internal calls must
      # present the external domain (same trick as the official login-v2 compose).
      ZITADEL_EXTERNAL_HOST: localhost
      ZITADEL_ISSUER: "${NUXT_ZITADEL_ISSUER:?}"
      APP_PORT: "${PORT:?}"                      # redirect URIs embed the nginx port
      PAT_FILE: /zitadel-seed/admin.pat
      SEED_FILE: "${NUXT_ZITADEL_SEED_FILE:?}"
    volumes:
      - zitadel-seed:/zitadel-seed
      - ./docker/zitadel/seed.mjs:/seed.mjs:ro
    command: ["node", "/seed.mjs"]
    restart: "no"

  nginx:
    image: nginx:alpine
    networks:
      - fnb-network
    depends_on:
      - auth-app
      - tenant-app
      - home-app
      - msg-app
      - graphql-api-app
      - storage-app
    ports:
      - "${PORT:?}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  auth-app:
    build:
      context: .
      dockerfile: apps/auth-app/Dockerfile
    networks:
      - fnb-network
    depends_on:
      pnpm-install:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
      packages-watch:
        condition: service_healthy
      zitadel-seed:
        condition: service_completed_successfully   # OIDC clientId handoff file must exist
    environment:
      NODE_ENV: "${NODE_ENV:?}"
      # D2 structural constants — must match docker/nginx.conf, which can't read .env.
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/auth"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      # ZITADEL OIDC (server/utils/oidc.ts): external issuer + internal origin + clientId handoff
      NUXT_ZITADEL_ISSUER: "${NUXT_ZITADEL_ISSUER:?}"
      NUXT_ZITADEL_INTERNAL_URL: "${NUXT_ZITADEL_INTERNAL_URL:?}"
      NUXT_ZITADEL_SEED_FILE: "${NUXT_ZITADEL_SEED_FILE:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
      VITE_HMR_CLIENT_PORT: "${VITE_HMR_CLIENT_PORT:?}"
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_auth_app:/app/apps/auth-app/node_modules
      - zitadel-seed:/zitadel-seed:ro
    working_dir: /app
    command: ["sh", "-c", "pnpm --filter @function-bucket/fnb-auth-app exec nuxt dev --host 0.0.0.0 --port 3000"]

  tenant-app:
    build:
      context: .
      dockerfile: apps/auth-app/Dockerfile
    networks:
      - fnb-network
    depends_on:
      pnpm-install:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
      packages-watch:
        condition: service_healthy
    environment:
      NODE_ENV: "${NODE_ENV:?}"
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/tenant"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      NUXT_PUBLIC_MSG_APP_URL: "${NUXT_PUBLIC_MSG_APP_URL:?}"
      NUXT_MSG_APP_INTERNAL_URL: "${NUXT_MSG_APP_INTERNAL_URL:?}"
      # storage-layer's uploadUrl runtimeConfig (tenant-app extends storage-layer — issue 0330).
      # Uploads still POST same-origin to storage-app via nginx /storage; no S3_* needed here.
      NUXT_PUBLIC_UPLOAD_URL: "${NUXT_PUBLIC_UPLOAD_URL:?}"
      # site-admin n8n Workflows page — editor link-out ('' sentinel in nuxt.config.ts)
      NUXT_PUBLIC_N8N_EDITOR_URL: "${NUXT_PUBLIC_N8N_EDITOR_URL:?}"
      MAPBOX_ACCESS_TOKEN: "${MAPBOX_ACCESS_TOKEN:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
      VITE_HMR_CLIENT_PORT: "${VITE_HMR_CLIENT_PORT:?}"
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_tenant_app:/app/apps/tenant-app/node_modules
    working_dir: /app
    command: ["sh", "-c", "pnpm --filter @function-bucket/fnb-tenant-app exec nuxt dev --host 0.0.0.0 --port 3000"]

  home-app:
    build:
      context: .
      dockerfile: apps/auth-app/Dockerfile
    networks:
      - fnb-network
    depends_on:
      pnpm-install:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
      packages-watch:
        condition: service_healthy
    environment:
      NODE_ENV: "${NODE_ENV:?}"
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
      VITE_HMR_CLIENT_PORT: "${VITE_HMR_CLIENT_PORT:?}"
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_home_app:/app/apps/home-app/node_modules
    working_dir: /app
    command: ["sh", "-c", "pnpm --filter @function-bucket/fnb-home-app exec nuxt dev --host 0.0.0.0 --port 3000"]

  msg-app:
    build:
      context: .
      dockerfile: apps/auth-app/Dockerfile
    networks:
      - fnb-network
    depends_on:
      pnpm-install:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
      packages-watch:
        condition: service_healthy
    environment:
      NODE_ENV: "${NODE_ENV:?}"
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/msg"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
      VITE_HMR_CLIENT_PORT: "${VITE_HMR_CLIENT_PORT:?}"
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_msg_app:/app/apps/msg-app/node_modules
    working_dir: /app
    command: ["sh", "-c", "pnpm --filter @function-bucket/fnb-msg-app exec nuxt dev --host 0.0.0.0 --port 3000"]

  graphql-api-app:
    build:
      context: .
      dockerfile: apps/auth-app/Dockerfile
    networks:
      - fnb-network
    depends_on:
      pnpm-install:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
      packages-watch:
        condition: service_healthy
    environment:
      NODE_ENV: "${NODE_ENV:?}"
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/graphql-api"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
      VITE_HMR_CLIENT_PORT: "${VITE_HMR_CLIENT_PORT:?}"
      # S3 creds for PRESIGNING ONLY (downloadUrl field — local HMAC, no S3 round-trip / writes).
      # No depends_on minio/clamav: graphql-api-app never touches the object store or the scanner.
      S3_ENDPOINT: "${S3_ENDPOINT:?}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:?}"    # browser-reachable base for public/ objects (dev; CDN in prod)
      S3_REGION: "${S3_REGION:?}"
      S3_BUCKET: "${S3_BUCKET:?}"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:?}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:?}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:?}"
      # agent-app trigger surface (triggerWorkflow extendSchema plugin — Phase 5)
      AGENT_INTERNAL_URL: "${AGENT_INTERNAL_URL:?}"
      AGENT_TRIGGER_SECRET: "${AGENT_TRIGGER_SECRET:?}"
      # n8n parallel engine — the trigger plugin's engine registry routes n8n-engine
      # workflow keys to the webhook URL with the shared secret (n8n-parallel-engine spec)
      N8N_INTERNAL_URL: "${N8N_INTERNAL_URL:?}"
      N8N_WEBHOOK_SECRET: "${N8N_WEBHOOK_SECRET:?}"
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_graphql_api_app:/app/apps/graphql-api-app/node_modules
    working_dir: /app
    command: ["sh", "-c", "pnpm --filter @function-bucket/fnb-graphql-api-app exec nuxt dev --host 0.0.0.0 --port 3000"]

  storage-app:
    build:
      context: .
      dockerfile: apps/auth-app/Dockerfile
    networks:
      - fnb-network
    depends_on:
      pnpm-install:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
      packages-watch:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully   # bucket exists before serving uploads
    environment:
      NODE_ENV: "${NODE_ENV:?}"
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/storage"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_PUBLIC_UPLOAD_URL: "${NUXT_PUBLIC_UPLOAD_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
      VITE_HMR_CLIENT_PORT: "${VITE_HMR_CLIENT_PORT:?}"
      # S3 for the upload endpoint's PutObject only — the scan pipeline (Get/Copy/Delete) and all
      # ClamAV coupling live in worker-app now
      S3_ENDPOINT: "${S3_ENDPOINT:?}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:?}"
      S3_REGION: "${S3_REGION:?}"
      S3_BUCKET: "${S3_BUCKET:?}"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:?}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:?}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:?}"
      # agent-app trigger surface (upload endpoint post-commit asset-scan POST — Phase 5)
      AGENT_INTERNAL_URL: "${AGENT_INTERNAL_URL:?}"
      AGENT_TRIGGER_SECRET: "${AGENT_TRIGGER_SECRET:?}"
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_storage_app:/app/apps/storage-app/node_modules
    working_dir: /app
    command: ["sh", "-c", "pnpm --filter @function-bucket/fnb-storage-app exec nuxt dev --host 0.0.0.0 --port 3000"]

  agent-app:
    build:
      context: .
      dockerfile: apps/agent-app/Dockerfile   # dedicated image — ffmpeg + clamav-clients (asset-scan tools)
    container_name: fnb_agent_app
    networks:
      - fnb-network
    depends_on:
      pnpm-install:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully   # fnb-agent schema + agent_worker role must exist
      packages-watch:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully   # asset-scan reads/moves bucket objects
      clamav:
        condition: service_started                  # SOFT gate — scan tool retries + reaper own the horizon
    environment:
      NODE_ENV: "${NODE_ENV:?}"
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      # Claude Agent SDK — the headless workflow engine (no nginx route; reachable only at
      # http://agent-app:3000 == AGENT_INTERNAL_URL, trigger routes gated by the shared secret)
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:?}"
      AGENT_MODEL_DEFAULT: "${AGENT_MODEL_DEFAULT:-claude-haiku-4-5}"
      AGENT_TRIGGER_SECRET: "${AGENT_TRIGGER_SECRET:?}"
      AGENT_WORKER_PG_PASSWORD: "${AGENT_WORKER_PG_PASSWORD:?}"
      AGENT_RUN_TIMEOUT_MINUTES: "${AGENT_RUN_TIMEOUT_MINUTES:-15}"
      # agent_worker pg pool — held by tool handlers + the harness only
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: "${POSTGRES_DB:?}"
      # Full S3 set — asset-scan tools: GetObject (scan stream), Copy/Delete (promote/purge)
      S3_ENDPOINT: "${S3_ENDPOINT:?}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:?}"
      S3_REGION: "${S3_REGION:?}"
      S3_BUCKET: "${S3_BUCKET:?}"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:?}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:?}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:?}"
      # ClamAV — consumed by the scan_and_resolve tool handler only
      CLAMAV_HOST: "${CLAMAV_HOST:?}"
      CLAMAV_PORT: "${CLAMAV_PORT:?}"
      # asset-scan tunables — reaper croner job reads ASSET_SCAN_REAPER_CRON (retained)
      ASSET_SCAN_MAX_WF_ATTEMPTS: "${ASSET_SCAN_MAX_WF_ATTEMPTS:?}"
      ASSET_SCAN_STUCK_MINUTES: "${ASSET_SCAN_STUCK_MINUTES:?}"
      ASSET_SCAN_REAPER_CRON: "${ASSET_SCAN_REAPER_CRON:?}"
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_agent_app:/app/apps/agent-app/node_modules
      - agent-transcripts:/data/transcripts       # per-run JSONL — the deep step-level record
    working_dir: /app
    command: ["sh", "-c", "pnpm --filter @function-bucket/fnb-agent-app exec nuxt dev --host 0.0.0.0 --port 3000"]
    restart: unless-stopped

  # ─── n8n parallel workflow engine (spec: .claude/specs/n8n-parallel-engine/) ───
  # Coexists with agent-app (dual engines — R22). State lives in the separate n8n_engine
  # database in the shared postgis cluster; editor + webhooks on their own host port
  # (ZITADEL own-port precedent — no nginx route). Official pinned image: the demo-only
  # inventory has no binary steps, so no custom Dockerfile.

  n8n-db-init:
    image: postgis/postgis
    platform: linux/amd64
    container_name: fnb_n8n_db_init
    networks:
      - fnb-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: "${POSTGRES_DB:?}"
      PGUSER: "${POSTGRES_USER:?}"
      PGPASSWORD: "${POSTGRES_PASSWORD:?}"
      N8N_ENGINE_DB_PASSWORD: "${N8N_ENGINE_DB_PASSWORD:?}"
    volumes:
      - ./docker/n8n/db-init.sh:/n8n-db-init.sh:ro
    entrypoint: ["/bin/sh", "/n8n-db-init.sh"]
    restart: "no"

  # Workflow-as-code import — runs BEFORE the server starts (CLI writes straight to
  # n8n_engine). Same pinned image as the server so CLI/schema versions match. Credential
  # templates render with the image's own node (no gettext in the stock image); rendered
  # files never touch the repo. Idempotent: stable ids overwrite in place (sqitch/seed analog).
  n8n-import:
    image: docker.n8n.io/n8nio/n8n:2.30.7
    container_name: fnb_n8n_import
    networks:
      - fnb-network
    depends_on:
      n8n-db-init:
        condition: service_completed_successfully
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n_engine
      DB_POSTGRESDB_USER: n8n_engine
      DB_POSTGRESDB_PASSWORD: "${N8N_ENGINE_DB_PASSWORD:?}"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:?}"
      # ${…} refs inside the credential templates (scripts/render-credentials.mjs)
      POSTGRES_DB: "${POSTGRES_DB:?}"
      N8N_WORKER_PG_PASSWORD: "${N8N_WORKER_PG_PASSWORD:?}"
      N8N_WEBHOOK_SECRET: "${N8N_WEBHOOK_SECRET:?}"
    volumes:
      - ./n8n/workflows:/import/workflows:ro
      - ./n8n/credentials:/import/credentials:ro
      - ./n8n/scripts:/import/scripts:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      # import:workflow force-deactivates everything it imports (observed live), and n8n 2.x
      # retired update:workflow --all — so publish each imported workflow by its id from the
      # repo JSON. Webhook workflows + the error-handler (which n8n 2.x requires to be ACTIVE)
      # must come back active or a rebuild boots with dead webhooks.
      - |
        node /import/scripts/render-credentials.mjs /import/credentials /tmp/creds &&
        n8n import:credentials --separate --input=/tmp/creds &&
        if ls /import/workflows/*.json >/dev/null 2>&1; then
          n8n import:workflow --separate --input=/import/workflows &&
          for f in /import/workflows/*.json; do
            n8n publish:workflow --id="$$(node -p "require('$$f').id")" || exit 1;
          done;
        else
          echo "no workflows to import yet (Phase 3 exports land here)";
        fi
    restart: "no"

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.30.7
    container_name: fnb_n8n
    networks:
      - fnb-network
    depends_on:
      n8n-import:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully   # fnb-n8n schema + n8n_worker role must exist
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n_engine
      DB_POSTGRESDB_USER: n8n_engine
      DB_POSTGRESDB_PASSWORD: "${N8N_ENGINE_DB_PASSWORD:?}"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:?}"
      N8N_PORT: "5678"
      N8N_LISTEN_ADDRESS: 0.0.0.0
      # editor-displayed URLs only; internal callers use N8N_INTERNAL_URL (http://n8n:5678)
      WEBHOOK_URL: "http://localhost:${N8N_HOST_PORT:?}/"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: "${TZ:-UTC}"
    ports:
      - "${N8N_HOST_PORT:?}:5678"                  # editor + webhooks (ZITADEL own-port precedent)
    volumes:
      - n8n-data:/home/node/.n8n                   # instance settings; state of record is n8n_engine
    healthcheck:
      # 127.0.0.1, not localhost: the alpine image resolves localhost to ::1 first and n8n
      # listens on IPv4 only — a localhost probe gets connection-refused while n8n is fine.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  pinger:
    build:
      context: docker/pinger
    networks:
      - fnb-network
    depends_on:
      - auth-app
      - tenant-app
      - home-app
      - msg-app
      - graphql-api-app
      - storage-app
    environment:
      PING_INTERVAL: "${PING_INTERVAL:?}"
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${DOZZLE_PORT:?}:8080"
    environment:
      DOZZLE_FILTER: "${DOZZLE_FILTER:?}"
    networks:
      - fnb-network

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
    listen 80;
    server_name localhost;

    proxy_connect_timeout 30s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (required for Vite HMR)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location /auth {
        proxy_pass http://auth-app:3000;
    }

    location /tenant {
        proxy_pass http://tenant-app:3000;
    }

    location /msg {
        proxy_pass http://msg-app:3000;
    }

    location /storage {
        proxy_pass http://storage-app:3000;
        # Upload cap: MAX_BODY_BYTES in upload.post.ts (5 MB file + 1 MB multipart headroom).
        # nginx default is 1m, which would 413 legitimate uploads before they reach the app.
        client_max_body_size 6m;
    }

    location /graphql-api/api/graphql/stream {
        proxy_pass http://graphql-api-app:3000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /graphql-api {
        proxy_pass http://graphql-api-app:3000;
    }

    location /ruru-static {
        proxy_pass http://graphql-api-app:3000;
    }

    location / {
        proxy_pass http://home-app:3000;
    }
}

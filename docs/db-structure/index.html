<!doctype html>
<!--
  fnb db structure — static tree browser over the psql-native capture in this directory.
  Hand-written; NEVER regenerated by pnpm db-introspect (the wipe preserves this file).
  Zero dependencies: data arrives via the db-structure.data.js script tag (works over file://).
  Spec: .claude/specs/db-introspect/browser.ui.md
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fnb db structure</title>
<style>
  :root {
    --bg: #f8fafc;
    --panel: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --accent: #16a34a;
    --accent-soft: #dcfce7;
    --hover: #f1f5f9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #4ade80;
      --accent-soft: #14532d;
      --hover: #263349;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  code, pre, .leaf, .badge { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

  header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex: none;
  }
  header h1 { font-size: 1rem; font-weight: 600; white-space: nowrap; }
  header h1::before { content: '▣ '; color: var(--accent); }
  #genAt { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #search {
    margin-left: auto;
    width: min(16rem, 40vw);
    padding: 0.3rem 0.6rem;
    font: inherit;
    font-size: 0.85rem;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 0.375rem;
  }
  #search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  #menuBtn {
    display: none;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.3rem 0.55rem;
    color: var(--text);
    background: none;
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    cursor: pointer;
  }

  #layout { flex: 1; display: flex; min-height: 0; }
  #tree {
    width: 300px;
    min-width: 220px;
    max-width: 60vw;
    resize: horizontal;
    overflow: auto;
    flex: none;
    border-right: 1px solid var(--border);
    background: var(--panel);
    padding: 0.5rem 0 2rem;
  }
  #content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  #crumb {
    flex: none;
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    white-space: nowrap;
    overflow-x: auto;
  }
  #view {
    flex: 1;
    overflow: auto;
    padding: 1rem;
    font-size: 0.8rem;
    line-height: 1.45;
    white-space: pre;
  }
  #hint {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 2rem;
    text-align: center;
  }
  [hidden] { display: none !important; }

  /* tree rows */
  .row {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.15rem 0.75rem;
    font-size: 0.82rem;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .row:hover { background: var(--hover); }
  .chev {
    flex: none;
    width: 0.8rem;
    color: var(--accent);
    font-size: 0.65rem;
    transition: transform 0.12s;
    display: inline-block;
  }
  .open > .row .chev { transform: rotate(90deg); }
  .branch > .children { display: none; }
  .branch.open > .children { display: block; }
  .cat > .children { display: none; }
  .cat.open > .children { display: block; }
  .cat > .row { padding-left: 1.6rem; color: var(--muted); }
  .badge {
    font-size: 0.68rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 0.6rem;
    padding: 0 0.4rem;
  }
  .leaf { padding-left: 2.8rem; }
  .leaf.top { padding-left: 1.6rem; }
  .leaf.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .leaf:focus-visible, .row:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

  #missing {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    color: var(--muted);
    line-height: 1.8;
  }
  #missing code {
    color: var(--accent);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0.25rem;
    padding: 0.1rem 0.4rem;
  }

  @media (max-width: 700px) {
    #menuBtn { display: block; }
    #tree {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 10;
      width: min(20rem, 85vw);
      max-width: none;
      resize: none;
      transform: translateX(-105%);
      transition: transform 0.15s ease-out;
      box-shadow: 0 0 2rem rgba(0, 0, 0, 0.35);
    }
    body.nav-open #tree { transform: none; }
    #genAt { display: none; }
  }
</style>
</head>
<body>
<header>
  <button id="menuBtn" aria-label="toggle tree">☰</button>
  <h1>fnb db structure</h1>
  <span id="genAt"></span>
  <input id="search" type="search" placeholder="search objects…" autocomplete="off">
</header>
<div id="layout">
  <nav id="tree"></nav>
  <main id="content">
    <div id="crumb" hidden></div>
    <pre id="view" hidden></pre>
    <div id="hint">select an object, or search</div>
  </main>
</div>
<script src="db-structure.data.js"></script>
<script>
(function () {
  'use strict'
  var data = window.DB_STRUCTURE
  if (!data) {
    document.getElementById('layout').innerHTML =
      '<div id="missing">No structure data found.<br>' +
      'Run <code>pnpm db-introspect</code> to generate <code>db-structure.data.js</code>, ' +
      'then reload this page.</div>'
    return
  }

  var treeEl = document.getElementById('tree')
  var crumbEl = document.getElementById('crumb')
  var viewEl = document.getElementById('view')
  var hintEl = document.getElementById('hint')
  var searchEl = document.getElementById('search')
  document.getElementById('genAt').textContent = 'generated ' + data.generatedAt

  // leaves[file] = { file, name, content, el, ancestors: [branchEl, catEl?] }
  var leaves = Object.create(null)
  var activeLeaf = null

  function el(tag, className, text) {
    var e = document.createElement(tag)
    if (className) e.className = className
    if (text != null) e.textContent = text
    return e
  }

  function makeLeaf(name, file, content, ancestors, topLevel) {
    var row = el('div', 'row leaf' + (topLevel ? ' top' : ''), name)
    row.tabIndex = 0
    row.dataset.file = file
    leaves[file] = { file: file, name: name, content: content, el: row, ancestors: ancestors }
    row.addEventListener('click', function () { select(file, true) })
    row.addEventListener('keydown', function (ev) {
      if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); select(file, true) }
    })
    return row
  }

  function makeToggleRow(container, label, badgeCount) {
    var row = el('div', 'row')
    row.tabIndex = 0
    row.appendChild(el('span', 'chev', '▶'))
    row.appendChild(el('span', null, label))
    if (badgeCount != null) row.appendChild(el('span', 'badge', String(badgeCount)))
    function toggle() { container.classList.toggle('open') }
    row.addEventListener('click', toggle)
    row.addEventListener('keydown', function (ev) {
      if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); toggle() }
    })
    return row
  }

  // _overview — pinned first branch; its leaves are the overview files
  var ovBranch = el('div', 'branch')
  ovBranch.appendChild(makeToggleRow(ovBranch, '_overview'))
  var ovChildren = el('div', 'children')
  data.overview.forEach(function (o) {
    ovChildren.appendChild(makeLeaf(o.name, '_overview/' + o.name, o.content, [ovBranch], true))
  })
  ovBranch.appendChild(ovChildren)
  treeEl.appendChild(ovBranch)

  // schemas → grants leaf + categories → object leaves
  data.schemas.forEach(function (schema) {
    var branch = el('div', 'branch')
    branch.appendChild(makeToggleRow(branch, schema.name))
    var children = el('div', 'children')
    children.appendChild(
      makeLeaf('grants', schema.name + '/grants.txt', schema.grants, [branch], true))
    schema.categories.forEach(function (category) {
      var cat = el('div', 'cat')
      cat.appendChild(makeToggleRow(cat, category.kind, category.items.length))
      var items = el('div', 'children')
      category.items.forEach(function (item) {
        items.appendChild(makeLeaf(item.name, item.file, item.content, [branch, cat], false))
      })
      cat.appendChild(items)
      children.appendChild(cat)
    })
    branch.appendChild(children)
    treeEl.appendChild(branch)
  })

  function select(file, fromClick) {
    var leaf = leaves[file]
    if (!leaf) return
    if (activeLeaf) activeLeaf.el.classList.remove('active')
    activeLeaf = leaf
    leaf.el.classList.add('active')
    leaf.ancestors.forEach(function (a) { a.classList.add('open') })
    crumbEl.textContent = 'docs/db-structure/' + file
    viewEl.textContent = leaf.content
    crumbEl.hidden = false
    viewEl.hidden = false
    hintEl.hidden = true
    viewEl.scrollTop = 0
    if ('#' + file !== decodeURIComponent(location.hash)) location.hash = file
    document.body.classList.remove('nav-open')
    if (!fromClick) leaf.el.scrollIntoView({ block: 'nearest' })
  }

  function selectFromHash() {
    var file = decodeURIComponent(location.hash.slice(1))
    if (file && leaves[file]) select(file, false)
  }
  window.addEventListener('hashchange', selectFromHash)
  selectFromHash()

  // search — substring filter on leaf names; snapshot/restore of the collapse state
  var preSearchOpen = null
  function openContainers() {
    return Array.prototype.slice.call(treeEl.querySelectorAll('.open'))
  }
  searchEl.addEventListener('input', function () {
    var q = searchEl.value.trim().toLowerCase()
    if (q && preSearchOpen === null) preSearchOpen = openContainers()
    if (!q) {
      Object.keys(leaves).forEach(function (f) { leaves[f].el.hidden = false })
      Array.prototype.forEach.call(treeEl.querySelectorAll('.branch, .cat'), function (c) {
        c.hidden = false
        c.classList.remove('open')
      })
      if (preSearchOpen) preSearchOpen.forEach(function (c) { c.classList.add('open') })
      if (activeLeaf) activeLeaf.ancestors.forEach(function (a) { a.classList.add('open') })
      preSearchOpen = null
      return
    }
    Array.prototype.forEach.call(treeEl.querySelectorAll('.branch, .cat'), function (c) {
      c.classList.remove('open')
    })
    Object.keys(leaves).forEach(function (f) {
      var leaf = leaves[f]
      var match = leaf.name.toLowerCase().indexOf(q) !== -1
      leaf.el.hidden = !match
      if (match) leaf.ancestors.forEach(function (a) { a.classList.add('open') })
    })
    Array.prototype.forEach.call(treeEl.querySelectorAll('.cat'), function (c) {
      c.hidden = c.querySelectorAll('.leaf:not([hidden])').length === 0
    })
    Array.prototype.forEach.call(treeEl.querySelectorAll('.branch'), function (b) {
      b.hidden = b.querySelectorAll('.leaf:not([hidden])').length === 0
    })
  })
  searchEl.addEventListener('keydown', function (ev) {
    if (ev.key !== 'Enter') return
    var visible = Object.keys(leaves).filter(function (f) { return !leaves[f].el.hidden })
    if (visible.length === 1) select(visible[0], false)
  })

  document.getElementById('menuBtn').addEventListener('click', function () {
    document.body.classList.toggle('nav-open')
  })
})()
</script>
</body>
</html>

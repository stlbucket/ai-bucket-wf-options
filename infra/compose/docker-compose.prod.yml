name: fnb-prod

# Production Compose — the SAME stack on DigitalOcean (droplet) and AWS (EC2).
# Ports docker-compose.yml (dev) to production posture (spec .claude/specs/deployment/
# production-runtime.md §2). Differences from dev:
#   • App services run PRE-BUILT images from the registry — no build:, no bind mounts, no
#     node_modules_* volumes, no pnpm-install / packages-watch.
#   • Data services are MANAGED (external): Postgres cluster + object storage (Spaces/S3) — the
#     `db`, `minio`, `minio-init`, `n8n-db-init` services are gone.
#   • Caddy is the front door (same proxy as dev; adds auto-TLS + id./n8n. subdomains).
#   • pg-bootstrap one-shot creates zitadel/n8n_engine DBs + PostGIS on the managed cluster.
#   • Dropped dev-only: pnpm-install, packages-watch, pinger, dozzle.
# Every value is ${VAR:?} — a missing key fails `up` loudly (render-env.mjs enforces this earlier).
# The rendered root-only .env supplies REGISTRY, IMAGE_TAG, DOMAIN, managed-PG + S3 + all secrets.

networks:
  fnb-network:
    name: fnb-network

volumes:
  agent-transcripts:   # per-run JSONL transcripts (agent engine step record)
  n8n-data:            # n8n instance settings; state of record is the n8n_engine DB
  clamav-db:           # virus signature DB
  zitadel-seed:        # PAT + { issuer, clientId } handoff (zitadel → seed job → auth-app)
  caddy-data:          # ACME account + issued certs — persist so restarts don't re-issue
  caddy-config:        # Caddy autosave config

services:

  # ── Managed-PG bootstrap (spec §7): zitadel/n8n_engine DBs + roles + PostGIS. Idempotent. ──
  pg-bootstrap:
    image: postgres:16-alpine   # psql client only; extensions live in the managed server
    networks:
      - fnb-network
    environment:
      PGHOST: "${MANAGED_PG_HOST:?}"
      PGPORT: "${MANAGED_PG_PORT:?}"
      PGUSER: "${MANAGED_PG_ADMIN_USER:?}"        # doadmin / RDS master user
      PGPASSWORD: "${MANAGED_PG_ADMIN_PASSWORD:?}"
      PGDATABASE: "${MANAGED_PG_ADMIN_DB:?}"      # defaultdb (DO) / postgres (RDS)
      APP_DB: "${POSTGRES_DB:?}"                  # app database (fnb) — PostGIS target
      ZITADEL_DB_PASSWORD: "${ZITADEL_DB_PASSWORD:?}"
      N8N_ENGINE_DB_PASSWORD: "${N8N_ENGINE_DB_PASSWORD:?}"
    volumes:
      - ../docker/pg-bootstrap.sh:/pg-bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/pg-bootstrap.sh"]
    restart: "no"

  # ── sqitch migrations against MANAGED Postgres (image + entrypoint unchanged from dev) ──
  db-migrate:
    build:
      # Repo root context — migrate.Dockerfile does `COPY docker/migrate-entrypoint.sh`, so its
      # context must be the repo root (as in dev), not infra/.
      context: ../..
      dockerfile: docker/migrate.Dockerfile      # repo docker/migrate.Dockerfile (unchanged)
    networks:
      - fnb-network
    depends_on:
      pg-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ../../db:/db:ro
    environment:
      DB_URL: "${DB_URL:?}"        # db:pg://…@<managed-host>:<port>/fnb?sslmode=require
      PG_URL: "${PG_URL:?}"        # postgresql://…@<managed-host>:<port>/fnb?sslmode=require
      DEPLOY_PACKAGES: "${DEPLOY_PACKAGES:?}"
      AGENT_WORKER_PG_PASSWORD: "${AGENT_WORKER_PG_PASSWORD:?}"
      N8N_WORKER_PG_PASSWORD: "${N8N_WORKER_PG_PASSWORD:?}"
    restart: "no"

  clamav:
    image: clamav/clamav:1.5.3
    networks:
      - fnb-network
    volumes:
      - clamav-db:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 180s
    restart: unless-stopped

  # ── ZITADEL — prod-hardened (spec §6): https issuer on id.<domain>, TLS terminated by Caddy ──
  zitadel-init:
    image: alpine:3.20
    volumes:
      - zitadel-seed:/zitadel-seed
    command: ["chown", "-R", "1000:1000", "/zitadel-seed"]
    restart: "no"

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.3
    networks:
      - fnb-network
    command: start-from-init --masterkeyFromEnv --tlsMode disabled   # Caddy does TLS; ZITADEL plain HTTP behind it
    depends_on:
      pg-bootstrap:
        condition: service_completed_successfully
      zitadel-init:
        condition: service_completed_successfully
    environment:
      ZITADEL_MASTERKEY: "${ZITADEL_MASTERKEY:?}"   # EXACTLY 32 chars; IMMUTABLE per environment
      ZITADEL_TLS_ENABLED: "false"
      # Prod origin — own subdomain, https, secure. ExternalSecure=true tells ZITADEL its public
      # origin is https even though it speaks plain HTTP to Caddy.
      ZITADEL_EXTERNALDOMAIN: "${ZITADEL_EXTERNALDOMAIN:?}"   # id.<domain>
      ZITADEL_EXTERNALPORT: "443"
      ZITADEL_EXTERNALSECURE: "true"
      # Managed cluster — dedicated `zitadel` database (created by pg-bootstrap). TLS required.
      ZITADEL_DATABASE_POSTGRES_HOST: "${MANAGED_PG_HOST:?}"
      ZITADEL_DATABASE_POSTGRES_PORT: "${MANAGED_PG_PORT:?}"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: "${ZITADEL_DB_PASSWORD:?}"
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: require
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: "${MANAGED_PG_ADMIN_USER:?}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: "${MANAGED_PG_ADMIN_PASSWORD:?}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: require
      # FirstInstance — applied ONCE on a fresh zitadel DB. The console admin here IS the prod admin
      # (no dev users; the prod seed skips user seeding). Password is a deploy-time secret.
      ZITADEL_FIRSTINSTANCE_INSTANCENAME: "fnb"
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel-seed/admin.pat
      ZITADEL_FIRSTINSTANCE_ORG_NAME: "fnb"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: "${ZITADEL_ADMIN_USERNAME:?}"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME: fnb
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: "${ZITADEL_ADMIN_EMAIL:?}"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "${ZITADEL_ADMIN_PASSWORD:?}"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "true"   # prod: force change on first login
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: fnb-seeder
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: fnb seed automation
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_ALLOWREGISTER: "false"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"
      # NOTE: the three dev PASSWORDCOMPLEXITYPOLICY_*=false lines are DELIBERATELY OMITTED — prod
      # keeps ZITADEL's default password complexity.
    volumes:
      - zitadel-seed:/zitadel-seed
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # One-shot prod seeding: project + Web app (https redirect URIs, devMode OFF) + { issuer, clientId }
  # handoff. ZITADEL_SEED_MODE=prod skips ALL dev user seeding (seed.mjs prod branch).
  zitadel-seed:
    image: node:22-alpine
    networks:
      - fnb-network
    depends_on:
      zitadel:
        condition: service_healthy
    environment:
      ZITADEL_SEED_MODE: "prod"
      ZITADEL_INTERNAL_URL: http://zitadel:8080
      ZITADEL_EXTERNAL_HOST: "${ZITADEL_EXTERNALDOMAIN:?}"   # id.<domain> — instance resolution
      ZITADEL_ISSUER: "${NUXT_ZITADEL_ISSUER:?}"             # https://id.<domain>
      APP_ORIGIN: "${APP_ORIGIN:?}"                          # https://<domain> — redirect URI base
      PAT_FILE: /zitadel-seed/admin.pat
      SEED_FILE: "${NUXT_ZITADEL_SEED_FILE:?}"
    volumes:
      - zitadel-seed:/zitadel-seed
      - ../../docker/zitadel/seed.mjs:/seed.mjs:ro   # repo seed.mjs (prod branch is additive)
    command: ["node", "/seed.mjs"]
    restart: "no"

  # ── n8n parallel workflow engine (spec §6 hardening; state in the managed n8n_engine DB) ──
  n8n-import:
    image: docker.n8n.io/n8nio/n8n:2.30.7
    networks:
      - fnb-network
    depends_on:
      pg-bootstrap:
        condition: service_completed_successfully
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: "${MANAGED_PG_HOST:?}"
      DB_POSTGRESDB_PORT: "${MANAGED_PG_PORT:?}"
      DB_POSTGRESDB_DATABASE: n8n_engine
      DB_POSTGRESDB_USER: n8n_engine
      DB_POSTGRESDB_PASSWORD: "${N8N_ENGINE_DB_PASSWORD:?}"
      DB_POSTGRESDB_SSL_ENABLED: "true"
      DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED: "false"   # managed CA; mount the CA for full verify (runbook)
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:?}"
      POSTGRES_DB: "${POSTGRES_DB:?}"
      N8N_WORKER_PG_PASSWORD: "${N8N_WORKER_PG_PASSWORD:?}"
      N8N_WEBHOOK_SECRET: "${N8N_WEBHOOK_SECRET:?}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:?}"
    volumes:
      - ../../n8n/workflows:/import/workflows:ro
      - ../../n8n/credentials:/import/credentials:ro
      - ../../n8n/scripts:/import/scripts:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        node /import/scripts/render-credentials.mjs /import/credentials /tmp/creds &&
        n8n import:credentials --separate --input=/tmp/creds &&
        if ls /import/workflows/*.json >/dev/null 2>&1; then
          n8n import:workflow --separate --input=/import/workflows &&
          for f in /import/workflows/*.json; do
            n8n publish:workflow --id="$$(node -p "require('$$f').id")" || exit 1;
          done;
        else
          echo "no workflows to import";
        fi
    restart: "no"

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.30.7
    networks:
      - fnb-network
    depends_on:
      n8n-import:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: "${MANAGED_PG_HOST:?}"
      DB_POSTGRESDB_PORT: "${MANAGED_PG_PORT:?}"
      DB_POSTGRESDB_DATABASE: n8n_engine
      DB_POSTGRESDB_USER: n8n_engine
      DB_POSTGRESDB_PASSWORD: "${N8N_ENGINE_DB_PASSWORD:?}"
      DB_POSTGRESDB_SSL_ENABLED: "true"
      DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED: "false"
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:?}"
      N8N_PORT: "5678"
      N8N_LISTEN_ADDRESS: 0.0.0.0
      # Prod: own https subdomain via Caddy. Editor + webhooks live here.
      N8N_HOST: "${N8N_EXTERNALDOMAIN:?}"        # n8n.<domain>
      N8N_PROTOCOL: https
      WEBHOOK_URL: "${N8N_WEBHOOK_URL:?}"        # https://n8n.<domain>/
      N8N_EDITOR_BASE_URL: "${N8N_WEBHOOK_URL:?}"
      N8N_PROXY_HOPS: "1"                        # behind Caddy
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: "${TZ:-UTC}"
    volumes:
      - n8n-data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ════════════════════════ Application containers (pre-built images) ════════════════════════
  # NUXT_APP_BASE_URL is a STRUCTURAL constant per app AND a build-time input — the runtime value
  # here MUST equal the value baked by build-images.sh (--build-arg BASE_URL). home-app has none.

  auth-app:
    image: "${REGISTRY:?}/fnb-auth-app:${IMAGE_TAG:?}"
    networks:
      - fnb-network
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      zitadel-seed:
        condition: service_completed_successfully   # OIDC clientId handoff file must exist
    environment:
      NODE_ENV: production
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/auth"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      NUXT_ZITADEL_ISSUER: "${NUXT_ZITADEL_ISSUER:?}"
      NUXT_ZITADEL_INTERNAL_URL: "${NUXT_ZITADEL_INTERNAL_URL:?}"
      NUXT_ZITADEL_SEED_FILE: "${NUXT_ZITADEL_SEED_FILE:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
    volumes:
      - zitadel-seed:/zitadel-seed:ro
    restart: unless-stopped

  home-app:
    image: "${REGISTRY:?}/fnb-home-app:${IMAGE_TAG:?}"
    networks:
      - fnb-network
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
    restart: unless-stopped

  tenant-app:
    image: "${REGISTRY:?}/fnb-tenant-app:${IMAGE_TAG:?}"
    networks:
      - fnb-network
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/tenant"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      NUXT_PUBLIC_MSG_APP_URL: "${NUXT_PUBLIC_MSG_APP_URL:?}"
      NUXT_MSG_APP_INTERNAL_URL: "${NUXT_MSG_APP_INTERNAL_URL:?}"
      NUXT_PUBLIC_UPLOAD_URL: "${NUXT_PUBLIC_UPLOAD_URL:?}"
      NUXT_PUBLIC_N8N_EDITOR_URL: "${NUXT_PUBLIC_N8N_EDITOR_URL:?}"
      MAPBOX_ACCESS_TOKEN: "${MAPBOX_ACCESS_TOKEN:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
    restart: unless-stopped

  msg-app:
    image: "${REGISTRY:?}/fnb-msg-app:${IMAGE_TAG:?}"
    networks:
      - fnb-network
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/msg"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
    restart: unless-stopped

  game-app:
    image: "${REGISTRY:?}/fnb-game-app:${IMAGE_TAG:?}"
    networks:
      - fnb-network
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/game"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
    restart: unless-stopped

  graphql-api-app:
    image: "${REGISTRY:?}/fnb-graphql-api-app:${IMAGE_TAG:?}"
    networks:
      - fnb-network
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/graphql-api"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
      # S3 presign only (downloadUrl — local HMAC, no S3 round-trip). Managed object store creds.
      S3_ENDPOINT: "${S3_ENDPOINT:?}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:?}"
      S3_REGION: "${S3_REGION:?}"
      S3_BUCKET: "${S3_BUCKET:?}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:?}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:?}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:?}"
      AGENT_INTERNAL_URL: "${AGENT_INTERNAL_URL:?}"
      AGENT_TRIGGER_SECRET: "${AGENT_TRIGGER_SECRET:?}"
      N8N_INTERNAL_URL: "${N8N_INTERNAL_URL:?}"
      N8N_WEBHOOK_SECRET: "${N8N_WEBHOOK_SECRET:?}"
    restart: unless-stopped

  storage-app:
    image: "${REGISTRY:?}/fnb-storage-app:${IMAGE_TAG:?}"
    networks:
      - fnb-network
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_APP_BASE_URL: "/storage"
      NUXT_PUBLIC_AUTH_APP_URL: "${NUXT_PUBLIC_AUTH_APP_URL:?}"
      NUXT_PUBLIC_GRAPHQL_API_URL: "${NUXT_PUBLIC_GRAPHQL_API_URL:?}"
      NUXT_PUBLIC_UPLOAD_URL: "${NUXT_PUBLIC_UPLOAD_URL:?}"
      NUXT_AUTH_APP_INTERNAL_URL: "${NUXT_AUTH_APP_INTERNAL_URL:?}"
      NUXT_SESSION_SECRET: "${NUXT_SESSION_SECRET:?}"
      DATABASE_URL: "${DATABASE_URL:?}"
      # S3 PutObject (upload endpoint). Managed object store creds.
      S3_ENDPOINT: "${S3_ENDPOINT:?}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:?}"
      S3_REGION: "${S3_REGION:?}"
      S3_BUCKET: "${S3_BUCKET:?}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:?}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:?}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:?}"
      AGENT_INTERNAL_URL: "${AGENT_INTERNAL_URL:?}"
      AGENT_TRIGGER_SECRET: "${AGENT_TRIGGER_SECRET:?}"
    restart: unless-stopped

  # Headless agentic engine (no Caddy route) — KEPT for now (removal is a later effort).
  agent-app:
    image: "${REGISTRY:?}/fnb-agent-app:${IMAGE_TAG:?}"
    networks:
      - fnb-network
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      clamav:
        condition: service_started
    environment:
      NODE_ENV: production
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:?}"
      AGENT_MODEL_DEFAULT: "${AGENT_MODEL_DEFAULT:-claude-haiku-4-5}"
      AGENT_TRIGGER_SECRET: "${AGENT_TRIGGER_SECRET:?}"
      AGENT_WORKER_PG_PASSWORD: "${AGENT_WORKER_PG_PASSWORD:?}"
      AGENT_RUN_TIMEOUT_MINUTES: "${AGENT_RUN_TIMEOUT_MINUTES:-15}"
      # agent_worker pg pool — MANAGED cluster (not the dev `db` host), TLS required.
      PGHOST: "${MANAGED_PG_HOST:?}"
      PGPORT: "${MANAGED_PG_PORT:?}"
      PGDATABASE: "${POSTGRES_DB:?}"
      PGSSLMODE: require
      S3_ENDPOINT: "${S3_ENDPOINT:?}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:?}"
      S3_REGION: "${S3_REGION:?}"
      S3_BUCKET: "${S3_BUCKET:?}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:?}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:?}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:?}"
      CLAMAV_HOST: "${CLAMAV_HOST:?}"
      CLAMAV_PORT: "${CLAMAV_PORT:?}"
      ASSET_SCAN_MAX_WF_ATTEMPTS: "${ASSET_SCAN_MAX_WF_ATTEMPTS:?}"
      ASSET_SCAN_STUCK_MINUTES: "${ASSET_SCAN_STUCK_MINUTES:?}"
      ASSET_SCAN_REAPER_CRON: "${ASSET_SCAN_REAPER_CRON:?}"
    volumes:
      - agent-transcripts:/data/transcripts
    restart: unless-stopped

  # ── Caddy — TLS front door (same proxy as dev docker/Caddyfile + TLS). Publishes 80/443; routes to the apps. ──
  caddy:
    image: caddy:2
    networks:
      - fnb-network
    depends_on:
      - auth-app
      - home-app
      - tenant-app
      - msg-app
      - game-app
      - graphql-api-app
      - storage-app
      - zitadel
      - n8n
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:?}"           # <domain>; Caddy derives id.<domain> / n8n.<domain>
      ACME_EMAIL: "${ACME_EMAIL:?}"
    volumes:
      - ../docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

query AdminSubscriptions {
  adminSubscriptions: tenantSubscriptionsList {
    ...TenantSubscription
    licensePack {
      ...LicensePack
      licensePackLicenseTypes: licensePackLicenseTypesByLicensePackKeyList {
        ...LicensePackLicenseType
        licenseType {
          ...LicenseType
        }
      }
    }
    licensesList {
      ...License
      resident {
        ...Resident
      }
    }
  }
}

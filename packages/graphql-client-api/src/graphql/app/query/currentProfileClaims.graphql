query CurrentProfileClaims {
  currentProfileClaims {
    ...ProfileClaim
  }

  availableModules {
    key
    name
    permissionKeys
    defaultIconKey
    ordinal
    toolsByModuleKeyList: tools {
      key
      name
      permissionKeys
      defaultIconKey
      ordinal
      route
    }
  }

  activeResidency: residentsList(condition: {
    status: ACTIVE
  }) {
    ...Resident
  }

  myResidencyTreeList {
    tenantId
    tenantName
    tenantType
    tenantStatus
    parentTenantId
    residentId
    residentStatus
    residentType
  }
}
query PollAttributedResponses($pollId: UUID!) {
  poll(id: $pollId) {
    id
    responsesList {
      id
      respondentResidentUrn
      submittedAt
      respondent: resourceByRespondentResidentUrn {
        resident {
          displayName
        }
      }
      answersList {
        id
        questionId
        optionId
        yesNo
        otherText
        note
        answerAt
      }
    }
  }
}

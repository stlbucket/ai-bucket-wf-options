query SearchTodos(
  $searchTerm: String
  $todoType: TodoType
  $rootsOnly: Boolean
  $isTemplate: Boolean
) {
   searchTodos (
    _options: {
      searchTerm: $searchTerm
      todoType: $todoType
      rootsOnly: $rootsOnly
      isTemplate: $isTemplate
  	}
  ){
    nodes {
      ...Todo
      residentResource: resourceByResidentUrn {
        resident {
          id
          displayName
        }
      }
      parentTodo {
        ...Todo
      }
      tenant {
        id
        name
      }
    }
  }
}